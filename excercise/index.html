<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="style.css">
  <title>Excerice</title>
</head>
<body>

  <div class="wrapper" id="workout">

    <div id="workout-selection" class="">

      <h1>WORKOUT GENERATOR</h1>

      <div id="time">
        <p>I have about</p>
        <input type="number" value="45" size="2" id="setTime">
        <p>minutes</p>
      </div>

      <div id="area">
        <p>And I want to focus on</p>
        <select name="area" id="selectArea">
          <option value="core">Core</option>
          <option value="legs">Legs</option>
          <option value="arms">Arms</option>
          <option value="back">Back</option>
          <option value="condition">Condition</option>
          <option value="condition">Full body</option>
        </select>
      </div>

      <div id="intensity">
        <p>With</p>
        <select name="intensity" id="selectIntensity">
          <option value="light">Light</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>
        <p>intensity</p>
      </div>
      
      <button onclick="getWorkout()">GO</button>
    
    </div>

    <div id="workout-workout" class="hide">

      <h1>LET'S GO</h1>

      <div id="workout-area">

        <div class="left-side">

          <div class="workout-card">

            <div class="card-image">
              <img src="" alt="" id="card-image-id">
            </div>

            <div class="card-text">
              <h4 id="workout-text">SITUPS</h4>
              <a href="#" id="workout-info">i</a>
              <div class="clear"></div>
            </div>
          </div>

          <div id="next-workout">
            <h6>next excercise</h6>
            <h5 id="next-excercise">PUSHUPS</h5>
          </div>

        </div>

        <div id="intervals">
          <h6 id="active">workout <span class="work" id="text-active"></span></h6>
          <h6>rest <span class="rest"></span></h6>
          <h6>workout <span class="work"></span></h6>
          <h6>rest <span class="rest"></span></h6>
          <h6>workout <span class="work"></span></h6>
          <h6>rest <span class="rest"></span></h6>
        </div>
        
      </div>

      <div class="buttons">
        <button onclick="stopWorkoutAndGoBack()">Back</button>
        <button>Pause</button>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
